<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KERA — Каталог</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="page-catalog">
    <header class="header-black">
        <a href="index.html" class="logo" style="color: white; text-decoration: none;">KERA</a>
        <nav>
            <a href="catalog.html" style="color: #fff;">Каталог</a>

    <main class="catalog-container">

            <a href="#posuda">ПОСУДА</a>
            <a href="#art">АРТ ОБЪЕКТЫ</a>
            <a href="#more">ЕЩЁ</a>
        </div>

        <section id="posuda" class="catalog-section">
            <h2 class="section-title">ПОСУДА</h2>
            <div class="products-grid">
                <div class="product-card-light">
                    <img src="posuda1.jpg" alt="Ваза Toys">
                    <div class="product-bottom">
                        <span class="price-tech">5500 р.</span>
                        <button class="btn-add-plus">+</button>
                    </div>
                </div>
                <div class="product-card-light">
                    <img src="posuda2.jpg" alt="Чаша">
                    <div class="product-bottom">
                        <span class="price-tech">3300 р.</span>
                        <button class="btn-add-plus">+</button>
                    </div>
                </div>
                <div class="product-card-light">
                    <img src="posuda3.png" alt="Стаканы">
                    <div class="product-bottom">
                        <span class="price-tech">4000 р.</span>
                        <button class="btn-add-plus">+</button>
                    </div>
                </div>
                <div class="product-card-light">
                    <img src="posuda4.png" alt="Кружки с шипами">
                    <div class="product-bottom">
                        <span class="price-tech">4000 р.</span>
                        <button class="btn-added">✔</button>
                    </div>
                </div>
                <div class="product-card-light">
                    <img src="posuda5.png" alt="Синяя ваза">
                    <div class="product-bottom">
                        <span class="price-tech">4500 р.</span>
                        <button class="btn-add-plus">+</button>
                    </div>
                </div>
                <div class="product-card-light">
                    <img src="posuda6.jpg" alt="Белая ваза с шипами">
                    <div class="product-bottom">
                        <span class="price-tech">7000 р.</span>
                        <button class="btn-add-plus">+</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="art" class="catalog-section">
            <h2 class="section-title">АРТ ОБЪЕКТЫ</h2>
            <div class="products-grid">
                <div class="product-card-light">
                    <img src="art1.jpg" alt="Арт объект 1">
                    <div class="product-bottom">
                        <span class="price-tech">15000 р.</span>
                        <button class="btn-add-plus">+</button>
                    </div>
                </div>
                <div class="product-card-light">
                    <img src="art2.png" alt="Арт объект 2">
                    <div class="product-bottom">
                        <span class="price-tech">25000 р.</span>
                        <button class="btn-add-plus">+</button>
                    </div>
                </div>
                <div class="product-card-light">
                    <img src="art3.png" alt="Арт объект 3">
                    <div class="product-bottom">
                        <span class="price-tech">10000 р.</span>
                        <button class="btn-add-plus">+</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="more" class="catalog-section">
            <h2 class="section-title">ЕЩЁ</h2>
            <div class="products-grid">
                <div class="product-card-light">
                    <img src="more1.jpg" alt="Шахматы">
                    <div class="product-bottom">
                        <span class="price-tech">5000 р.</span>
                        <button class="btn-add-plus">+</button>
                    </div>
                </div>
            </div>
